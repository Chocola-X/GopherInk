{{define "content"}}
<section class="post-list">
  {{range .Posts}}
  <a class="post-card" href="/post/{{.Slug}}">
    <div class="post-card-media">
      <div class="post-card-filter"></div>
      <div class="post-card-text">
        <h2>{{.Title}}</h2>
        <div class="meta">{{date .Created}} · {{.CommentsNum}} 条评论</div>
        <p>{{excerpt .Text 150}}</p>
      </div>
    </div>
  </a>
  {{else}}
  <section class="empty-card">还没有发布文章。</section>
  {{end}}
</section>
{{end}}
