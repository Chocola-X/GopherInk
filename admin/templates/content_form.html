{{define "content"}}
<div class="page-head">
  <div>
    <h1>{{.Title}}</h1>
    <p class="muted">{{if eq .Type "page"}}页面支持父级、排序和自定义模板。{{else}}文章支持分类、标签和公开度。{{end}}</p>
  </div>
  <mdui-button variant="outlined" href="{{if eq .Type "page"}}/admin/pages{{else}}/admin/posts{{end}}">返回</mdui-button>
</div>
{{if .Saved}}<div class="notice">已保存。</div>{{end}}
<form method="post" action="{{.Action}}" class="form-panel field-stack">
  <mdui-text-field name="title" label="标题" value="{{.Content.Title}}" required></mdui-text-field>
  <mdui-text-field name="slug" label="固定链接" value="{{.Content.Slug}}" helper="留空时由标题生成"></mdui-text-field>
  <mdui-text-field name="created" label="发布日期" value="{{date .Content.Created}}" helper="格式：2006-01-02 15:04"></mdui-text-field>
  <label class="muted" for="status">公开度</label>
  <select id="status" name="status">
    <option value="publish" {{if eq .Content.Status "publish"}}selected{{end}}>公开</option>
    <option value="draft" {{if eq .Content.Status "draft"}}selected{{end}}>草稿</option>
    <option value="hidden" {{if eq .Content.Status "hidden"}}selected{{end}}>隐藏</option>
    {{if eq .Type "post"}}
    <option value="waiting" {{if eq .Content.Status "waiting"}}selected{{end}}>待审核</option>
    <option value="private" {{if eq .Content.Status "private"}}selected{{end}}>私密</option>
    {{end}}
  </select>
  <mdui-text-field name="password" label="内容密码" value="{{.Content.Password}}"></mdui-text-field>
  {{if eq .Type "post"}}
  <fieldset class="fieldset">
    <legend>分类</legend>
    {{range .Categories}}
      <label><input type="checkbox" name="category" value="{{.MID}}" {{if containsMeta $.SelectedCategories .MID}}checked{{end}}> {{.Name}}</label>
    {{else}}
      <span class="muted">还没有分类。</span>
    {{end}}
  </fieldset>
  <mdui-text-field name="tags" label="标签" value="{{joinMetaNames .SelectedTags}}" helper="多个标签用逗号分隔"></mdui-text-field>
  {{else}}
  <mdui-text-field name="sortOrder" label="页面顺序" type="number" value="{{.Content.SortOrder}}"></mdui-text-field>
  <mdui-text-field name="template" label="自定义模板" value="{{.Content.Template}}"></mdui-text-field>
  <label class="muted" for="parent">父级页面</label>
  <select id="parent" name="parent">
    <option value="0">不选择</option>
    {{range .Pages}}{{if ne .CID $.Content.CID}}<option value="{{.CID}}" {{if eq $.Content.Parent .CID}}selected{{end}}>{{.Title}}</option>{{end}}{{end}}
  </select>
  {{end}}
  <fieldset class="fieldset">
    <legend>权限控制</legend>
    <label><input type="checkbox" name="allowComment" value="1" {{if checked .Content.AllowComment}}checked{{end}}> 允许评论</label>
    <label><input type="checkbox" name="allowPing" value="1" {{if checked .Content.AllowPing}}checked{{end}}> 允许被引用</label>
    <label><input type="checkbox" name="allowFeed" value="1" {{if checked .Content.AllowFeed}}checked{{end}}> 允许在聚合中出现</label>
  </fieldset>
  <mdui-text-field name="text" label="正文" rows="16" autosize>{{.Content.Text}}</mdui-text-field>
  <div class="form-actions">
    <mdui-button type="submit"><mdui-icon-edit slot="icon"></mdui-icon-edit>保存</mdui-button>
  </div>
</form>
{{end}}
