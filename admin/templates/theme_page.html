{{define "content"}}
<div class="page-head">
  <div>
    <h1>{{.Title}}</h1>
    {{if .Description}}<p class="muted">{{.Description}}</p>{{end}}
  </div>
  <mdui-button variant="outlined" href="{{.BackURL}}">{{T "Back"}}</mdui-button>
</div>
<div class="subnav">
  <mdui-button variant="tonal" href="/admin/themes/{{.ThemeName}}/config"><mdui-icon slot="icon" name="tune"></mdui-icon>{{T "Settings"}}</mdui-button>
  {{range .ThemePages}}<mdui-button variant="{{if eq .Name $.ThemePage.Name}}filled{{else}}tonal{{end}}" href="/admin/themes/{{$.ThemeName}}/config?tab={{.Name}}"><mdui-icon slot="icon" name="{{.Icon}}"></mdui-icon>{{call $.ExtensionT .Label}}</mdui-button>{{end}}
</div>
{{.ThemePageHTML}}
{{end}}
