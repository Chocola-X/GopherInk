{{define "content"}}
<div class="page-head"><div><h1>评论</h1><p class="muted">审核、编辑、回复和删除评论。</p></div></div>
<form method="get" class="filter-bar">
  <mdui-text-field name="keywords" label="关键字" value="{{.Keywords}}"></mdui-text-field>
  <mdui-select name="status" label="状态" value="{{if .Status}}{{.Status}}{{else}}approved{{end}}">
    <mdui-menu-item value="approved">已通过</mdui-menu-item>
    <mdui-menu-item value="waiting">待审核</mdui-menu-item>
    <mdui-menu-item value="spam">垃圾</mdui-menu-item>
    <mdui-menu-item value="all">全部</mdui-menu-item>
  </mdui-select>
  <mdui-select name="type" label="类型" value="{{if .Type}}{{.Type}}{{else}}all{{end}}">
    <mdui-menu-item value="all">全部</mdui-menu-item>
    <mdui-menu-item value="comment">评论</mdui-menu-item>
    <mdui-menu-item value="pingback">Pingback</mdui-menu-item>
    <mdui-menu-item value="trackback">Trackback</mdui-menu-item>
  </mdui-select>
  {{if .CID}}<input type="hidden" name="cid" value="{{.CID}}">{{end}}
  <mdui-button type="submit" variant="outlined">筛选</mdui-button>
</form>
<form method="post" action="/admin/comments/batch">
  <input type="hidden" name="_csrf" value="{{.CSRF}}">
  <div class="bulk-actions">
    <mdui-button type="submit" name="action" value="approved" variant="tonal">批量通过</mdui-button>
    <mdui-button type="submit" name="action" value="waiting" variant="tonal">批量待审</mdui-button>
    <mdui-button type="submit" name="action" value="spam" variant="tonal">批量垃圾</mdui-button>
    <mdui-button type="submit" name="action" value="delete" variant="outlined">批量删除</mdui-button>
  </div>
  <section class="table-panel"><table>
    <thead><tr><th></th><th>作者</th><th>内容</th><th>状态</th><th>日期</th><th></th></tr></thead>
    <tbody>{{range .Comments}}<tr>
      <td><mdui-checkbox name="id" value="{{.COID}}" aria-label="选择评论"></mdui-checkbox></td>
      <td><strong>{{.Author}}</strong><br><span class="muted">{{.Mail}} {{.IP}}</span></td>
      <td>{{.Text}}<br><span class="muted">{{.Type}} 于 {{.Title}}</span></td>
      <td>{{.Status}}</td><td>{{date .Created}}</td>
      <td><div class="row-actions">
        <mdui-button type="submit" formaction="/admin/comments/{{.COID}}/mark" name="status" value="approved" variant="text">通过</mdui-button>
        <mdui-button type="submit" formaction="/admin/comments/{{.COID}}/mark" name="status" value="waiting" variant="text">待审</mdui-button>
        <mdui-button type="submit" formaction="/admin/comments/{{.COID}}/mark" name="status" value="spam" variant="text">垃圾</mdui-button>
        <mdui-button-icon href="/admin/comments/{{.COID}}/edit" title="编辑"><mdui-icon name="edit"></mdui-icon></mdui-button-icon>
        <mdui-button href="/admin/comments/{{.COID}}/reply" variant="text">回复</mdui-button>
        <mdui-button-icon type="submit" formaction="/admin/comments/{{.COID}}/delete" title="删除"><mdui-icon name="delete"></mdui-icon></mdui-button-icon>
      </div></td>
    </tr>{{else}}<tr><td colspan="6" class="muted">没有评论。</td></tr>{{end}}</tbody>
  </table></section>
</form>
<form method="post" action="/admin/comments/clear-spam" class="form-actions">
  <input type="hidden" name="_csrf" value="{{.CSRF}}">
  <mdui-button type="submit" variant="outlined">清空垃圾评论</mdui-button>
</form>
{{end}}
