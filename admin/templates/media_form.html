{{define "content"}}
<div class="page-head">
  <div><h1>{{T "Edit attachment"}}</h1><p class="muted">{{T "Edit attachment title and description without changing its file URL."}}</p></div>
  <mdui-button variant="outlined" href="/admin/medias">{{T "Back"}}</mdui-button>
</div>
<form method="post" action="{{.Action}}" class="form-panel field-stack">
  {{if .Error}}<div class="notice danger">{{T .Error}}</div>{{end}}
  <mdui-text-field name="title" label="{{T "Title"}}" value="{{.Media.Title}}" required></mdui-text-field>
  <mdui-text-field label="{{T "Filename"}}" value="{{.Meta.Name}}" readonly></mdui-text-field>
  <mdui-text-field name="description" label="{{T "Description"}}" rows="4" autosize>{{.Meta.Description}}</mdui-text-field>
  <div class="form-actions"><mdui-button type="submit">{{T "Save"}}</mdui-button></div>
</form>
{{end}}
