{{define "content"}}
<div class="page-head"><div><h1>阅读设置</h1></div></div>{{template "options_tabs" .}}{{if .Saved}}<div class="notice">设置已保存。</div>{{end}}
<form method="post" class="form-panel field-stack">
  <mdui-text-field name="post_date_format" label="文章日期格式" value="{{index .Options "post_date_format"}}"></mdui-text-field>
  <mdui-text-field name="posts_list_size" label="文章列表数目" type="number" value="{{index .Options "posts_list_size"}}"></mdui-text-field>
  <mdui-text-field name="page_size" label="每页文章数目" type="number" value="{{index .Options "page_size"}}"></mdui-text-field>
  <mdui-select name="feed_full_text" label="聚合全文输出" value="{{index .Options "feed_full_text"}}">
    <mdui-menu-item value="0">仅输出摘要</mdui-menu-item>
    <mdui-menu-item value="1">全文输出</mdui-menu-item>
  </mdui-select>
  <div class="form-actions"><mdui-button type="submit">保存设置</mdui-button></div>
</form>
{{end}}{{define "options_tabs"}}<div class="subnav"><mdui-button variant="tonal" href="/admin/options/general">基本</mdui-button><mdui-button variant="tonal" href="/admin/options/reading">阅读</mdui-button><mdui-button variant="tonal" href="/admin/options/discussion">评论</mdui-button><mdui-button variant="tonal" href="/admin/options/permalink">永久链接</mdui-button></div>{{end}}
