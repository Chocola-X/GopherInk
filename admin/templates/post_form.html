{{define "content"}}
<div class="page-head">
  <div>
    <h1>{{.Title}}</h1>
    <p class="muted">{{T "Content is saved as plain text and rendered safely."}}</p>
  </div>
  <mdui-button variant="outlined" href="/admin/posts">{{T "Back"}}</mdui-button>
</div>
{{if .Saved}}<div class="notice">{{T "Saved."}}</div>{{end}}
<form method="post" action="{{.Action}}" class="form-panel field-stack">
  <mdui-text-field name="title" label="{{T "Title"}}" value="{{.Post.Title}}" required></mdui-text-field>
  <mdui-text-field name="slug" label="{{T "Slug"}}" value="{{.Post.Slug}}" helper="{{T "Blank generates from title"}}"></mdui-text-field>
  <label class="muted" for="status">{{T "Status"}}</label>
  <select id="status" name="status">
    <option value="publish" {{if eq .Post.Status "publish"}}selected{{end}}>{{T "Publish"}}</option>
    <option value="draft" {{if eq .Post.Status "draft"}}selected{{end}}>{{T "Drafts"}}</option>
  </select>
  <mdui-text-field name="text" label="{{T "Content"}}" rows="14" autosize>{{.Post.Text}}</mdui-text-field>
  <div class="form-actions">
    <mdui-button type="submit"><mdui-icon slot="icon" name="edit"></mdui-icon>{{T "Save"}}</mdui-button>
  </div>
</form>
{{end}}
