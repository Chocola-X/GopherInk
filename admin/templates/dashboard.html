{{define "content"}}
<div class="page-head">
  <div>
    <h1>控制台</h1>
    <p class="muted">保持核心纯粹，把扩展交给主题和插件。</p>
  </div>
  <mdui-button href="/admin/posts/new"><mdui-icon-add slot="icon"></mdui-icon-add>写文章</mdui-button>
</div>
<section class="grid">
  <div class="stat-panel">
    <span class="muted">文章</span>
    <strong class="stat-value">{{.Stats.Posts}}</strong>
  </div>
  <div class="stat-panel">
    <span class="muted">页面</span>
    <strong class="stat-value">{{.Stats.Pages}}</strong>
  </div>
  <div class="stat-panel">
    <span class="muted">评论</span>
    <strong class="stat-value">{{.Stats.Comments}}</strong>
  </div>
  <div class="stat-panel">
    <span class="muted">已编译插件</span>
    <strong class="stat-value">{{.PluginCount}}</strong>
  </div>
</section>
<section class="form-panel" style="margin-top:16px">
  <h2>快捷入口</h2>
  <p>
    <mdui-button href="/admin/pages/new" variant="outlined">写页面</mdui-button>
    <mdui-button href="/admin/categories" variant="outlined">管理分类</mdui-button>
    <mdui-button href="/admin/comments" variant="outlined">管理评论</mdui-button>
  </p>
</section>
<section class="form-panel" style="margin-top:16px">
  <h2>插件</h2>
  {{if .Plugins}}
    {{range .Plugins}}
      <p><strong>{{.Name}}</strong> <span class="muted">v{{.Version}} · {{.Description}}</span></p>
    {{end}}
  {{else}}
    <p class="muted">暂无插件</p>
  {{end}}
</section>
{{end}}
