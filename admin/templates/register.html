{{define "content"}}
<section class="login-panel">
  <h1>{{T "Register"}}</h1>
  <p class="muted">{{T "Create account"}}</p>
  {{if .Error}}<div class="notice danger">{{T .Error}}</div>{{end}}
  <form method="post" class="field-stack">
    <input type="hidden" name="_csrf" value="{{.CSRF}}">
    <mdui-text-field name="name" label="{{T "Username"}}" value="{{.User.Name}}" {{if fieldError .Errors "name"}}helper="{{fieldError .Errors "name"}}"{{end}} required></mdui-text-field>
    <mdui-text-field name="screenName" label="{{T "Nickname"}}" value="{{.User.ScreenName}}" {{if fieldError .Errors "screenName"}}helper="{{fieldError .Errors "screenName"}}"{{end}}></mdui-text-field>
    <mdui-text-field name="mail" label="{{T "Email"}}" value="{{.User.Mail}}" {{if fieldError .Errors "mail"}}helper="{{fieldError .Errors "mail"}}"{{end}} required></mdui-text-field>
    <mdui-text-field name="url" label="{{T "Website"}}" value="{{.User.URL}}" {{if fieldError .Errors "url"}}helper="{{fieldError .Errors "url"}}"{{end}}></mdui-text-field>
    <mdui-text-field name="password" label="{{T "Password"}}" type="password" {{if fieldError .Errors "password"}}helper="{{fieldError .Errors "password"}}"{{end}} required></mdui-text-field>
    <mdui-text-field name="confirm" label="{{T "Confirm password"}}" type="password" {{if fieldError .Errors "confirm"}}helper="{{fieldError .Errors "confirm"}}"{{end}} required></mdui-text-field>
    <mdui-button type="submit" full-width>{{T "Register"}}</mdui-button>
    <mdui-button variant="text" href="/admin/login" full-width>{{T "Already have account"}}</mdui-button>
  </form>
</section>
{{end}}
