{{define "content"}}
<div class="page-head"><div><h1>基本设置</h1></div></div>
{{template "options_tabs" .}}
{{if .Saved}}<div class="notice">设置已保存。</div>{{end}}
<form method="post" class="form-panel field-stack">
  <mdui-text-field name="site_title" label="站点名称" value="{{index .Options "site_title"}}" required></mdui-text-field>
  <mdui-text-field name="base_url" label="站点地址" value="{{index .Options "base_url"}}" required></mdui-text-field>
  <mdui-text-field name="site_description" label="站点描述" value="{{index .Options "site_description"}}"></mdui-text-field>
  <mdui-text-field name="site_keywords" label="关键词" value="{{index .Options "site_keywords"}}"></mdui-text-field>
  <label class="muted" for="allow_register">是否允许注册</label><select id="allow_register" name="allow_register"><option value="0" {{if eq (index .Options "allow_register") "0"}}selected{{end}}>不允许</option><option value="1" {{if eq (index .Options "allow_register") "1"}}selected{{end}}>允许</option></select>
  <mdui-text-field name="active_theme" label="当前主题" value="{{index .Options "active_theme"}}"></mdui-text-field>
  <div class="form-actions"><mdui-button type="submit">保存设置</mdui-button></div>
</form>
{{end}}

{{define "options_tabs"}}<div class="subnav"><a href="/admin/options/general">基本</a><a href="/admin/options/reading">阅读</a><a href="/admin/options/discussion">评论</a><a href="/admin/options/permalink">永久链接</a></div>{{end}}
