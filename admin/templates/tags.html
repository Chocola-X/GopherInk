{{define "content"}}
<div class="page-head"><div><h1>标签</h1><p class="muted">管理标签云。</p></div><mdui-button href="/admin/tags/new"><mdui-icon-add slot="icon"></mdui-icon-add>新增标签</mdui-button></div>
<section class="table-panel"><table>
  <thead><tr><th>名称</th><th>缩略名</th><th>文章数</th><th></th></tr></thead>
  <tbody>{{range .Items}}<tr>
    <td><strong>{{.Name}}</strong></td><td>{{.Slug}}</td><td>{{.Count}}</td>
    <td><div class="row-actions"><mdui-button-icon href="/admin/tags/{{.MID}}/edit" title="编辑"><mdui-icon-edit></mdui-icon-edit></mdui-button-icon><form method="post" action="/admin/tags/{{.MID}}/delete"><mdui-button-icon type="submit" title="删除"><mdui-icon-delete></mdui-icon-delete></mdui-button-icon></form></div></td>
  </tr>{{else}}<tr><td colspan="4" class="muted">没有任何标签。</td></tr>{{end}}</tbody>
</table></section>
{{end}}
