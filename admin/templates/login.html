{{define "content"}}
<section class="login-panel">
  <h1>{{T "Login"}}</h1>
  <p class="muted">{{T "Enter admin"}}</p>
  {{if .Error}}<div class="notice danger">{{T .Error}}</div>{{end}}
  <form method="post" class="field-stack">
    <input type="hidden" name="_csrf" value="{{.CSRF}}">
    <input type="hidden" name="next" value="{{.Next}}">
    <mdui-text-field name="name" label="{{T "Username"}}" value="{{.Name}}" {{if fieldError .Errors "name"}}helper="{{fieldError .Errors "name"}}"{{end}} required></mdui-text-field>
    <mdui-text-field name="password" label="{{T "Password"}}" type="password" required></mdui-text-field>
    <mdui-button type="submit" full-width>{{T "Login"}}</mdui-button>
  </form>
</section>
{{end}}
